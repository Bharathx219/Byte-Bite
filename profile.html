<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Byte - Bite My Account</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rokkitt:wght@500;700;900&family=Roboto:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="profile-style.css">
    <link rel="stylesheet" href="shared-theme.css">
</head>
<body>

    <!-- Header -->
    <header class="top-nav">
        <div class="brand-section">
            <div class="logo-box">
                <!-- Ensure Logo.png is in the folder -->
                <img src="Logo.png" alt="Logo" class="nav-logo">
            </div>
            <span class="page-name">MY ACCOUNT</span>
        </div>

        <nav class="nav-links">
            <a href="menu.html"><i class="fa-solid fa-house"></i> Home</a>
            <a href="search.html"><i class="fa-solid fa-magnifying-glass"></i> Search</a>
            <a href="offers.html"><i class="fa-solid fa-percent"></i> Offers</a>
            <a href="help.html"><i class="fa-solid fa-handshake"></i> Help</a>
            <a href="checkout.html"><i class="fa-solid fa-cart-shopping"></i> Cart</a>
        </nav>
    </header>

    <!-- Red Background Area -->
    <div class="main-wrapper">
        
        <!-- User Info Strip -->
        <div class="user-info-strip">
            <div class="user-details">
                <h2 id="userNameDisplay">USER NAME</h2>
                <p id="userPhoneDisplay">USER PHONE NO</p>
                <p id="userEmailDisplay">EMAIL ACCOUNT</p>
            </div>
            <div class="user-actions">
                <button class="action-btn" id="logoutBtn">Log Out</button>
                <button class="action-btn" id="editProfileBtn">EDIT PROFILE</button>
            </div>
        </div>

        <!-- White Card Container -->
        <div class="profile-card">
            
            <!-- Left Sidebar -->
            <aside class="sidebar-menu">
                <div class="menu-item active">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span>ORDERS</span>
                </div>
                
                <div class="menu-item">
                    <i class="fa-solid fa-heart-circle-check"></i>
                    <span>FAVOURITES</span>
                </div>

                <div class="menu-item">
                    <i class="fa-solid fa-credit-card"></i>
                    <span>PAYMENTS</span>
                </div>

                <div class="menu-item">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>ADDRESSES</span>
                </div>

                <div class="menu-item">
                    <i class="fa-solid fa-gear"></i>
                    <span>SETTINGS</span>
                </div>
            </aside>

            <!-- Right Content Area (Empty placeholder) -->
            <main class="content-area">
                <!-- Content will be loaded here dynamically if needed -->
            </main>

        </div>
    </div>

    <script src="profile-script.js"></script>

    <script src="back-button.js"></script>
</body>
</html>
