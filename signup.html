<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Byte-Bite | Sign Up</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="signup-style.css">
</head>

<body>
    <main class="login-layout">
        <section class="form-panel">
            <div class="form-wrapper">
                <a href="index.html" style="text-decoration: none;">
                    <p class="eyebrow" style="color: #000; display:flex; align-items:center; gap: 8px;">
                        <i class="fa-solid fa-arrow-left"></i> BACK TO HOME
                    </p>
                </a>

                <h2>Sign up</h2>
                <p class="eyebrow" style="margin-bottom: 24px;">Create your account</p>

                <form id="signupForm" novalidate>
                    <div class="input-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="Enter your full name" autocomplete="name" required>
                    </div>
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email" autocomplete="email" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Create a password" autocomplete="new-password"
                            required>
                    </div>
                    <div class="input-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Re-enter password"
                            autocomplete="new-password" required>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="login-btn">CONTINUE</button>
                    </div>
                </form>

                <p class="signup-note">Already have an account? <a href="login.html">Sign in</a></p>
            </div>
        </section>
    </main>
    <script src="signup-script.js"></script>

    <script src="back-button.js"></script>
</body>

</html>
