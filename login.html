<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Byte-Bite | Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Sora:wght@600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login-style.css">
    <link rel="stylesheet" href="shared-theme.css">
</head>

<body>
    <main class="login-layout">
        <section class="brand-panel">
            <a href="index.html" class="brand-link">
                <img src="Logo.png" alt="Byte-Bite Logo" class="brand-logo-image">
                <h1>BYTE-BITE</h1>
            </a>
            <p class="tagline">Restaurant-quality meals, delivered faster than your cravings.</p>
            <div class="trust-row">
                <span><i class="fa-solid fa-bolt"></i> 30 min delivery</span>
                <span><i class="fa-solid fa-shield-heart"></i> Safe & verified kitchens</span>
            </div>
        </section>

        <section class="form-panel">
            <div class="form-wrapper">
                <p class="eyebrow">Welcome back</p>
                <h2>Sign in to continue</h2>
                <form id="loginForm" novalidate>
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email" autocomplete="email" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password"
                            autocomplete="current-password" required>
                    </div>
                    <div class="form-actions">
                        <a href="forgotpass.html" class="forgot-pass">Forgot Password?</a>
                        <button type="submit" class="login-btn">Sign In</button>
                    </div>
                </form>
                <p class="signup-note">New here? <a href="signup.html">Create account</a></p>
            </div>
        </section>
    </main>
    <script src="login-script.js"></script>

    <script src="back-button.js"></script>
</body>

</html>
